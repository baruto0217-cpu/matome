<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Obs Emergency PRO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#ffffff;--bg2:#f8fafc;--bg3:#f1f5f9;
  --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
  --radius-md:8px;--radius-lg:14px;--radius-xl:20px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e293b;--bg2:#0f172a;--bg3:#020617;
    --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  }
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg3);color:var(--text);font-size:16px;}
.app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:640px;margin:0 auto;position:relative;}
/* Nav */
.nav{background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;flex-shrink:0;}
.nav button{flex:1;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;border:none;cursor:pointer;background:none;border-bottom:2px solid transparent;color:var(--text2);transition:all .2s;font-family:var(--font);}
.nav button.active{color:#dc2626;border-bottom-color:#dc2626;background:rgba(220,38,38,0.04);}
/* Main */
.main{flex:1;overflow-y:auto;padding:14px 14px 140px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;}
/* Cards */
.card{background:var(--bg);border-radius:var(--radius-xl);padding:18px;border:0.5px solid var(--border);}
/* Labels */
.label{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.14em;font-family:var(--mono);}
/* Weeks display */
.weeks-num{font-size:50px;font-weight:700;line-height:1;color:var(--text);}
.weeks-unit{font-size:18px;color:var(--text3);}
/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* Inputs */
input[type=date],input[type=number]{
  width:100%;padding:10px 12px;background:var(--bg2);
  border:0.5px solid var(--border);border-radius:var(--radius-md);
  font-size:12px;font-weight:600;outline:none;color:var(--text);
  font-family:var(--font);
}
input[type=date]:focus,input[type=number]:focus{border-color:#dc2626;}
input[type=number]{text-align:center;font-size:28px;padding:14px;font-family:var(--mono);}
/* Range */
input[type=range]{width:100%;height:6px;border-radius:3px;appearance:none;outline:none;border:none;background:var(--bg3);}
input[type=range]::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
#rangeW::-webkit-slider-thumb{background:#dc2626;}
#rangeD::-webkit-slider-thumb{background:#2563eb;}
/* SI box */
.si-box{padding:14px 18px;border-radius:var(--radius-lg);display:flex;justify-content:space-between;align-items:center;background:var(--bg2);transition:background .4s;}
.si-box.danger{background:#fef2f2;}
.si-num{font-size:38px;font-weight:700;font-family:var(--mono);}
/* Symptom buttons */
.sym-group{display:flex;flex-direction:column;gap:7px;}
.sym-group-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.16em;display:flex;align-items:center;gap:5px;font-family:var(--mono);}
.sym-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:var(--radius-lg);border:1.5px solid var(--border);background:var(--bg);cursor:pointer;text-align:left;transition:all .15s;font-family:var(--font);}
.sym-btn:active{transform:scale(0.98);}
.sym-btn.on-red{background:#fff5f5;border-color:#f87171;color:#991b1b;}
.sym-btn.on-blue{background:#eff6ff;border-color:#60a5fa;color:#1e3a8a;}
.sym-btn.on-purple{background:#faf5ff;border-color:#c084fc;color:#581c87;}
.sym-btn.on-orange{background:#fff7ed;border-color:#fb923c;color:#7c2d12;}
.sym-label{font-size:12px;font-weight:600;display:block;color:inherit;}
.sym-sub{font-size:10px;opacity:0.6;display:block;margin-top:2px;font-weight:500;}
.check-icon{width:20px;height:20px;border-radius:50%;background:#dc2626;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* Facility card */
.facility-card{padding:18px 22px;border-radius:22px;border-left:8px solid;display:flex;flex-direction:column;gap:6px;transition:all .4s;}
.facility-name{font-size:18px;font-weight:700;line-height:1.3;}
.facility-reason{font-size:12px;font-weight:500;opacity:0.85;}
/* Red flag */
.redflag-card{background:#fff5f5;border-radius:20px;padding:14px;border:0.5px solid #fca5a5;}
.redflag-item{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--bg);padding:11px 13px;border-radius:11px;border:0.5px solid #fca5a5;font-size:13px;font-weight:600;color:#7f1d1d;cursor:pointer;margin-bottom:5px;transition:all .15s;font-family:var(--font);}
.redflag-item:active{transform:scale(0.98);}
/* Watchlist */
.watchlist-item{border-radius:var(--radius-lg);border:1.5px solid var(--border);overflow:hidden;margin-bottom:6px;transition:border-color .2s;}
.watchlist-item.active{border-color:#ef4444;}
.watchlist-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:none;border:none;cursor:pointer;text-align:left;font-family:var(--font);}
.watchlist-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0;}
.watchlist-dot.active{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,0.5);}
.watchlist-detail{padding:12px 14px;border-top:0.5px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.detail-sec{border-radius:10px;padding:10px 12px;}
/* Reference */
.ref-card{background:var(--bg);border-radius:var(--radius-xl);padding:16px;border:0.5px solid var(--border);margin-bottom:12px;}
.ref-title{font-size:15px;font-weight:700;margin-bottom:12px;padding-bottom:10px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;}
/* Footer */
.footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;display:flex;border-top:0.5px solid rgba(255,255,255,0.15);z-index:120;transition:background .4s;padding-bottom:env(safe-area-inset-bottom);}
.footer-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px 14px;}
.footer-item:first-child{border-right:0.5px solid rgba(255,255,255,0.15);}
.footer-sublabel{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.13em;opacity:0.5;margin-bottom:3px;font-family:var(--mono);}
.footer-value{font-size:13px;font-weight:600;color:#fff;}
/* Period badge */
.period-badge{padding:5px 11px;border-radius:11px;font-size:11px;font-weight:700;}
/* SI grade badges */
.si-badge{font-size:10px;font-weight:700;padding:4px 9px;border-radius:7px;text-align:center;white-space:nowrap;}
.si-badge.warn{background:#fef3c7;color:#b45309;border:0.5px solid #fcd34d;}
.si-badge.danger{background:#fee2e2;color:#dc2626;border:0.5px solid #fca5a5;}
.si-badge.critical{background:#7f1d1d;color:#fff;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="nav" id="nav">
    <button class="active" onclick="switchTab('assessment',this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      観察 / 入力
    </button>
    <button onclick="switchTab('reasoning',this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      推論 / 判定
    </button>
    <button onclick="switchTab('reference',this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      資料 / 解説
    </button>
  </div>
  <div class="main" id="main-content"></div>
  <div class="footer" id="footer" style="background:#1e293b;">
    <div class="footer-item">
      <div class="footer-sublabel">Positioning</div>
      <div class="footer-value" id="footer-pos">通常体位</div>
    </div>
    <div class="footer-item">
      <div class="footer-sublabel">Shock Index</div>
      <div class="footer-value" id="footer-si">--</div>
    </div>
  </div>
</div>

<script>
var state={
  weeks:28,days:0,lmp:'',edc:'',hr:'',sbp:'',dbp:'',
  tab:'assessment',openDisease:null,
  symptoms:{
    boardLikeRigidity:false,continuousPain:false,periodicPain:false,epigastricPain:false,
    painlessBleeding:false,bleedingWithPain:false,rupture:false,prolapseSensation:false,
    seizure:false,visualDisturbance:false,headache:false,coldSweat:false,dyspnea:false,fetalMovementReduced:false,
    nauseaVomiting:false,jaundice:false,dehydration:false
  }
};

var diseases=[
  {id:'abortion',name:'流産・切迫流産',range:[2,22],pathology:'妊娠22週未満に妊娠が中断される状態。母体の大出血が救急上の課題となる。',findings:'下腹部痛、性器出血（鮮血・凝血塊）。週数が進むほど出血リスク増大。',action:'出血量・バイタル確認。SI上昇時は迅速な搬送が必要。'},
  {id:'cervical_shock',name:'子宮頸部ショック',range:[2,22],pathology:'流産時などに内容物が子宮頸管に嵌入し、迷走神経刺激によりショックを来す。',findings:'下腹部痛、出血。迷走神経反射による「徐脈」と「血圧低下」が特徴。',action:'内容物除去が必要。体位調整と速やかな搬送。'},
  {id:'hyperemesis',name:'つわり・妊娠悪阻',range:[4,14],pathology:'hCG上昇等による消化器症状。重症化すると脱水やケトーシスを来す。',findings:'頻回な嘔吐、体重減少、皮膚の乾燥（脱水）。',action:'脱水の評価。ビタミンB1を含む輸液が必須。'},
  {id:'ectopic',name:'異所性妊娠',range:[0,11],pathology:'子宮体部以外への着床（卵管が最多）。卵管破裂時は腹腔内大量出血でショックとなる。外出血が少量でもSIが急上昇する。',findings:'下腹部痛（片側性）、不正出血。破裂時はSI急上昇、冷汗、腹膜刺激症状。血圧低下は遅れて出現する。',action:'緊急手術が可能な医療機関への最優先搬送。ショック体位、酸素投与。腹腔内出血のため輸液確保。'},
  {id:'incompetence',name:'子宮頸管無力症',range:[12,37],pathology:'無痛性に頸管が開大し、胎胞が脱出する早産の主要原因。自覚症状が乏しいまま急速に進行することがある。',findings:'自覚症状は少ないが、脱出感・帯下増加。胎胞が外陰部に触れる場合がある。',action:'【腹圧厳禁】絶対安静。水平保持（トレンデレンブルグ位）での搬送。胎胞を押し込もうとしない。'},
  {id:'hellp_syndrome',name:'HELLP症候群',range:[27,39],pathology:'GL2023（CQ312）：溶血（H）・肝酵素上昇（EL）・血小板減少（LP）。HDP非合併例も約20%。診断遅延は肝破裂・肝不全を招く極めて危険な状態。',findings:'GL2023：心窩部痛・右季肋部痛（胃炎・胆石症と誤認されやすい）、悪心嘔吐、黄疸。高血圧がなくても発症する（HDP非合併型に注意）。',action:'緊急妊娠終結（ターミネーション）が必要。AFLP（急性妊娠脂肪肝）との鑑別困難。総合周産期センターへ最優先搬送。'},
  {id:'placenta_previa',name:'前置胎盤',range:[24,39],pathology:'胎盤が子宮口を覆う。突然の大量出血（警告出血）リスクがある。内診・経腟超音波が出血を誘発する。',findings:'無痛性の突発的な鮮血出血（警告出血）。腹痛なし。反復することがある。',action:'【内診絶対禁忌】経腟操作は大出血を誘発する。安静を保ち帝王切開可能施設へ搬送。出血量に応じてSIを監視。'},
  {id:'eclampsia',name:'子癇',range:[20,42],pathology:'GL2023（CQ309-3）：妊娠20週以降の強直性・間代性痙攣。脳出血を合併しやすく、転落による外傷リスクもある。痙攣は通常自然停止する。',findings:'強直性・間代性痙攣（通常自然停止）。前駆症状：重い頭痛、視覚障害（チカチカ・霧視）、心窩部痛、過度の不安。',action:'GL2023：①転落防止（ベッド柵・安全確保）②側臥位へ体位変換③口腔内吸引④気道確保・酸素投与。バイトブロックは嘔吐・誤嚥リスクあり慎重に。刺激回避（遮光・静音）で緊急搬送。'},
  {id:'hdp_logic',name:'妊娠高血圧症候群 (HDP)',range:[20,42],pathology:'GL2023（CQ309）診断基準：sBP≥140mmHg または dBP≥90mmHg。重症（高血圧緊急症）：sBP≥160mmHg または dBP≥110mmHg。脳出血・腎不全・常位胎盤早期剥離の原因となる。',findings:'GL2023：sBP≥140またはdBP≥90（HDP基準）。重症サイン：重い頭痛・視覚障害（チカチカ）・心窩部痛・急激な浮腫。蛋白尿の有無も重要。',action:'GL2023：安静・刺激回避。重症（sBP≥160/dBP≥110）は「高血圧緊急症」として速やかに降圧治療開始。高次施設への搬送。'},
  {id:'pa_logic',name:'常位胎盤早期剥離',range:[22,42],pathology:'GL2023（CQ308）：分娩前に胎盤が剥がれ、母体DIC・胎児死亡を招く産科最緊急疾患。外出血を伴わない潜在性早剝では胎児死亡に至ることが多い。',findings:'GL2023：板状硬（子宮過緊張）、持続的腹痛、ポートワイン色のさらっとした性器出血。外出血がなくても胎動減少・消失で疑う。SI急上昇（DICに注意）。',action:'GL2023：大量輸血（新鮮凍結血漿+赤血球製剤）を待たず開始を考慮。超音波で異常がなくても否定できない。総合周産期センターへ最優先搬送。'},
  {id:'afe_logic',name:'羊水塞栓症',range:[36,42],pathology:'羊水成分による急性肺塞栓・アナフィラキシー様反応・DIC。分娩中〜直後に突然発症。予測・予防が困難な産科最緊急疾患の一つ。',findings:'突然の呼吸困難・SpO2低下・意識消失。心肺停止、さらさらした止まらない性器出血（DIC出血）。出血凝固不全が特徴。',action:'即座にCPR開始。大量輸血体制のある施設（ICU完備）への緊急搬送。フィブリノゲン補充を含む大量輸血プロトコル適応。'},
  {id:'aflp',name:'急性妊娠脂肪肝 (AFLP)',range:[28,40],pathology:'GL2023（CQ312）：妊娠後期の肝脂肪変性。HELLP症候群と鑑別困難で同一CQに収載。低血糖・凝固障害・腎不全を合併し、母児死亡リスクが高い重篤疾患。',findings:'全身倦怠感・悪心嘔吐・黄疸・右季肋部痛。低血糖（発汗・意識障害・振戦）を合併することがある。HELLP症候群と症状が重複。',action:'低血糖補正（ブドウ糖投与）しながら緊急搬送。総合周産期センターで緊急妊娠終結が必要。早期認識・早期分娩が予後を左右する。'},
  {id:'pph',name:'産後出血 (PPH)',range:[37,42],pathology:'GL2023（CQ418）：分娩後500mL以上の出血。子宮弛緩が最多原因（約80%）。血圧低下は遅れて現れるためSI監視が重要。SI≥1.0で急性循環不全対応が必要。',findings:'GL2023基準：100bpm以上の頻脈 または SI≥1.0 または 興奮・不穏・不安などの意識状態 → 急性循環不全と判断。分娩後の大量性器出血、子宮軟性（弛緩）。',action:'GL2023：①酸素投与②血液検査（フィブリノゲン含む）輸血準備③トラネキサム酸投与を考慮。子宮底輪状マッサージ。自施設困難なら大量輸血対応施設へ緊急搬送。'}
];

function getSI(){
  var h=parseFloat(state.hr),s=parseFloat(state.sbp);
  return(h&&s)?(h/s):null;
}

function getSIGrade(si){
  if(!si)return null;
  if(si>=2.0)return{level:3,label:'最重篤 SI≥2.0',color:'#7f1d1d',badge:'CRITICAL',est:'推定出血>3L'};
  if(si>=1.5)return{level:2,label:'危険 SI≥1.5',color:'#dc2626',badge:'DANGER',est:'推定出血約2.5L'};
  if(si>=1.0)return{level:1,label:'要注意 SI≥1.0',color:'#d97706',badge:'WARNING',est:'推定出血約1.5L'};
  return{level:0,label:'正常範囲',color:'#16a34a',badge:'NORMAL',est:''};
}

function getLogic(){
  var w=state.weeks,s=state.symptoms,si=getSI(),sbp=parseFloat(state.sbp),hr=parseFloat(state.hr),dbp=parseFloat(state.dbp);
  var redFlags=[];
  var facility={level:'一般産科 / 救急',reason:'通常リスク',bg:'#f1f5f9',color:'#334155',border:'#94a3b8'};
  var pos={label:'通常体位',strict:false};
  if(w>=20)pos={label:'左側臥位 厳守',strict:true};
  else if(w>=12)pos={label:'左側臥位 推奨',strict:false};
  if(w<22)facility={level:'一般病院（母体救急）',reason:'流産期。母体救命を優先。',bg:'#f1f5f9',color:'#334155',border:'#94a3b8'};
  else if(w<28)facility={level:'総合周産期センター',reason:'超早産期。高次施設が必須。',bg:'#fef2f2',color:'#991b1b',border:'#ef4444'};
  else if(w<34)facility={level:'地域・総合周産期',reason:'早産期。NICU管理。',bg:'#eff6ff',color:'#1e40af',border:'#3b82f6'};
  else facility={level:'一般産科・地域周産期',reason:'正期産。成熟児対応。',bg:'#f0fdf4',color:'#166534',border:'#22c55e'};
  if(s.boardLikeRigidity||(s.continuousPain&&si&&si>=1.0))redFlags.push({name:'常位胎盤早期剥離（GL2023 CQ308）',id:'pa_logic'});
  if(w>=24&&(s.epigastricPain||(s.jaundice&&s.nauseaVomiting)))redFlags.push({name:'HELLP症候群 疑い（GL2023 CQ312）',id:'hellp_syndrome'});
  if(s.jaundice&&(s.nauseaVomiting||s.epigastricPain)&&w>=28)redFlags.push({name:'急性妊娠脂肪肝(AFLP) 疑い（GL2023 CQ312）',id:'aflp'});
  if(s.painlessBleeding&&w>=24)redFlags.push({name:'前置胎盤 警告出血（内診厳禁）',id:'placenta_previa'});
  if(s.seizure)redFlags.push({name:'子癇（GL2023 CQ309-3）',id:'eclampsia'});
  var hdpSevere=(s.visualDisturbance||(s.headache&&(sbp>=160||dbp>=110)))||(sbp>=160||dbp>=110);
  var hdpMild=!hdpSevere&&w>=20&&(sbp>=140||dbp>=90);
  if(hdpSevere)redFlags.push({name:'重症HDP（高血圧緊急症）sBP≥160またはdBP≥110',id:'hdp_logic'});
  else if(hdpMild)redFlags.push({name:'HDP疑い sBP≥140またはdBP≥90（GL2023 CQ309-1）',id:'hdp_logic'});
  if(s.prolapseSensation&&w<37)redFlags.push({name:'子宮頸管無力症（腹圧禁忌）',id:'incompetence'});
  if(s.bleedingWithPain&&w<22)redFlags.push({name:'流産・切迫流産',id:'abortion'});
  if(hr<60&&s.bleedingWithPain&&w<22)redFlags.push({name:'子宮頸部ショック（迷走神経反射）',id:'cervical_shock'});
  if(s.dyspnea&&w>=34)redFlags.push({name:'羊水塞栓症 疑い（即時CPR）',id:'afe_logic'});
  if(s.fetalMovementReduced)redFlags.push({name:'胎児機能不全 疑い（胎動消失は最重要サイン）',id:'pa_logic'});
  if(redFlags.length>0)facility={level:'高次医療機関（緊急搬送）',reason:'緊急疾患の徴候あり：周産期センターを選定してください。',bg:'#dc2626',color:'#ffffff',border:'#991b1b'};
  return{facility,redFlags,pos};
}

function getPeriodLabel(){
  var w=state.weeks;
  if(w<22)return'流産期';
  if(w<37)return'早産期';
  return'正期産';
}

function switchTab(tab,btn){
  state.tab=tab;
  document.querySelectorAll('.nav button').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  render();
}

function toggleSymptom(id){
  state.symptoms[id]=!state.symptoms[id];
  render();
}

function openDisease(id){
  state.openDisease=state.openDisease===id?null:id;
  render();
  setTimeout(function(){
    var el=document.getElementById('disease-'+id);
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function updateFromLMP(v){
  state.lmp=v;state.edc='';
  if(v){
    var today=new Date();today.setHours(0,0,0,0);
    var lmp=new Date(v);
    var diff=Math.floor((today-lmp)/86400000);
    if(diff>=0&&diff<=300){state.weeks=Math.floor(diff/7);state.days=diff%7;}
  }
  render();
}

function updateFromEDC(v){
  state.edc=v;state.lmp='';
  if(v){
    var today=new Date();today.setHours(0,0,0,0);
    var edc=new Date(v);
    var diff=280-Math.floor((edc-today)/86400000);
    if(diff>=0&&diff<=300){state.weeks=Math.floor(diff/7);state.days=diff%7;}
  }
  render();
}

  '</div>'+
  '<div style="margin-top:12px;background:#fef2f2;border:1.5px dashed #fca5a5;border-radius:10px;padding:12px;">'+
  '<div style="font-size:12px;font-weight:500;color:#991b1b;line-height:1.6;"><span style="background:#dc2626;color:white;padding:2px 6px;border-radius:4px;font-size:9px;margin-right:6px;">ALERT</span><b>35歳以上</b>は高齢妊娠に分類。HDPや胎盤異常の合併率が高いため注意。</div></div>'+
  '</div>'+
  '<div class="ref-card">'+
  '<div class="ref-title" style="color:#dc2626;">🏥 医療機関の機能解説</div>'+
  '<div style="display:flex;flex-direction:column;gap:10px;">'+
  '<div style="background:#fff5f5;border-radius:12px;padding:14px;"><div style="font-size:14px;font-weight:600;color:#991b1b;margin-bottom:6px;">総合周産期母子医療センター</div><div style="font-size:11px;color:var(--text2);line-height:1.6;">MFICUおよびNICUを完備。超早産児や重篤母体合併症に対応する、日本の周産期医療の頂点施設。</div></div>'+
  '<div style="background:#eff6ff;border-radius:12px;padding:14px;"><div style="font-size:14px;font-weight:600;color:#1e40af;margin-bottom:6px;">地域周産期母子医療センター</div><div style="font-size:11px;color:var(--text2);line-height:1.6;">NICUを完備し、比較高度な周産期医療を担う拠点。総合センターへの橋渡しも行う。</div></div>'+
  '<div style="background:#fff7ed;border-radius:12px;padding:14px;border:0.5px solid #fed7aa;"><div style="font-size:14px;font-weight:600;color:#9a3412;margin-bottom:6px;">妊娠終結（Termination）</div><div style="font-size:11px;color:var(--text2);line-height:1.6;">母体または胎児の救急事態により人為的に妊娠を終了させること。緊急手術が必要です。</div></div>'+
  '</div></div>'+
  '<div class="ref-card">'+
  '<div class="label" style="margin-bottom:12px;">Specialized Units</div>'+
  [
    {unit:'MFICU',desc:'母体・胎児集中治療室。重症妊婦を24時間監視管理。'},
    {unit:'NICU',desc:'新生児集中治療室。高度な治療を行うユニット。'},
    {unit:'GCU',desc:'継続保育室。安定した児が退院に向けた管理を受けるユニット。'}
  ].map(function(u){
    return'<div style="background:var(--bg2);border-radius:10px;padding:12px;margin-bottom:8px;border:0.5px solid var(--border);">'+
    '<div style="font-size:12px;font-weight:700;font-family:var(--mono);margin-bottom:4px;color:var(--text);">'+u.unit+'</div>'+
    '<div style="font-size:11px;color:var(--text2);line-height:1.5;">'+u.desc+'</div></div>';
  }).join('')+
  '</div>'+glContent;
}

function render(){
  var logic=getLogic();
  var main=document.getElementById('main-content');
  if(state.tab==='assessment')main.innerHTML=renderAssessment();
  else if(state.tab==='reasoning')main.innerHTML=renderReasoning();
  else main.innerHTML=renderReference();
  var pos=logic.pos;
  var footer=document.getElementById('footer');
  document.getElementById('footer-pos').textContent=pos.label;
  var si=getSI();
  var siEl=document.getElementById('footer-si');
  siEl.textContent=si?si.toFixed(2):'--';
  siEl.style.color=si&&si>1.0?'#fca5a5':'#fff';
  if(pos.strict){
    footer.style.background='#b91c1c';
    document.getElementById('footer-pos').style.animation='pulse 1.5s infinite';
  }else{
    footer.style.background='#1e293b';
    document.getElementById('footer-pos').style.animation='none';
  }
}

render();
</script>
</body>
</html>
